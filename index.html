<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4M - العب وتعلم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f9ff; color: #333; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; border: 3px solid #2563eb; }
        h1 { color: #2563eb; font-size: 24px; }
        .logo { font-size: 32px; font-weight: bold; color: #f59e0b; margin-bottom: 10px; text-shadow: 1px 1px 2px #ccc; }
        .game-area { font-size: 50px; margin: 25px 0; min-height: 70px; background: #fffbeb; border-radius: 15px; padding: 10px; }
        input { width: 80px; padding: 12px; font-size: 22px; border-radius: 12px; border: 2px solid #cbd5e1; text-align: center; outline: none; }
        input:focus { border-color: #2563eb; }
        button { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-size: 20px; margin-top: 15px; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #059669; transform: scale(1.02); }
        .result { margin-top: 20px; font-weight: bold; font-size: 20px; height: 30px; }
        .whatsapp-btn { display: inline-block; margin-top: 30px; color: #059669; text-decoration: none; font-weight: bold; border: 2px solid #059669; padding: 10px 20px; border-radius: 50px; transition: 0.3s; }
        .whatsapp-btn:hover { background: #059669; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">4M</div>
    <p style="color: #64748b; font-weight: bold;">Smart Learning System</p>
    <h1>كم عدد الأشكال في المربع؟ 🤔</h1>
    
    <div id="game-area" class="game-area"></div>
    
    <input type="number" id="user-answer" placeholder="؟" min="1">
    <br>
    <button onclick="checkAnswer()">تحقق من الإجابة</button>
    
    <div id="result-msg" class="result"></div>

    <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">
    <a href="https://wa.me/201222325708?text=أنا-مهتمة-بطلب-نسخة-جديدة-من-4M" class="whatsapp-btn">طلب النسخة القادمة من 4M 📚</a>
</div>

<script>
    let currentNumber = 0;
    const icons = ['🍎', '🍏', '🍊', '🍓', '🎈', '⭐', '🦁', '🚗'];

    function startGame() {
        currentNumber = Math.floor(Math.random() * 5) + 1;
        let randomIcon = icons[Math.floor(Math.random() * icons.length)];
        document.getElementById('game-area').innerText = randomIcon.repeat(currentNumber);
        document.getElementById('result-msg').innerText = '';
        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').focus();
    }

    function checkAnswer() {
        let userAnswer = document.getElementById('user-answer').value;
        let msg = document.getElementById('result-msg');
        
        if(userAnswer == currentNumber) {
            msg.innerHTML = "بطل! إجابة صحيحة 🌟👏";
            msg.style.color = "#10b981";
            setTimeout(startGame, 2000);
        } else if (userAnswer == "") {
            msg.innerHTML = "اكتب رقم يا بطل! 😊";
            msg.style.color = "#f59e0b";
        } else {
            msg.innerHTML = "حاول مرة تانية.. أنت تقدر! 💪";
            msg.style.color = "#ef4444";
        }
    }

    // لتشغيل اللعبة عند الضغط على Enter
    document.getElementById('user-answer').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });

    startGame();
</script>

</body>
</html>
