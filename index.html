<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4M - العب وتعلم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f0f9ff; color: #333; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; border: 3px solid #2563eb; }
        h1 { color: #2563eb; font-size: 24px; margin-bottom: 10px; }
        .logo { font-size: 32px; font-weight: bold; color: #f59e0b; margin-bottom: 5px; text-shadow: 1px 1px 2px #ccc; }
        .game-area { font-size: 50px; margin: 20px 0; min-height: 70px; background: #fffbeb; border-radius: 15px; padding: 15px; display: flex; justify-content: center; align-items: center; }
        
        input { width: 80px; padding: 12px; font-size: 22px; border-radius: 12px; border: 2px solid #cbd5e1; text-align: center; outline: none; margin: 5px; }
        input:focus { border-color: #2563eb; }
        
        button { background: #10b981; color: white; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-size: 20px; margin-top: 10px; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: #059669; transform: scale(1.02); }
        
        .result { margin-top: 15px; font-weight: bold; font-size: 20px; height: 30px; }
        
        /* تصميم لوحة الشرف الجديد */
        #honor-roll { margin-top: 35px; background: #fffbeb; padding: 20px; border-radius: 20px; border: 2px dashed #f59e0b; }
        #honor-roll h2 { color: #d97706; font-size: 18px; margin-top: 0; }
        #hero-name { width: 85%; font-size: 16px; margin-bottom: 10px; }
        .save-btn { background: #f59e0b; font-size: 16px; margin-top: 5px; }
        
        #names-list { list-style: none; padding: 0; margin-top: 15px; }
        #names-list li { background: white; margin: 8px 0; padding: 10px; border-radius: 10px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); text-align: right; border-right: 5px solid #f59e0b; animation: slideIn 0.4s ease-out; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .whatsapp-btn { display: inline-block; margin-top: 25px; color: #059669; text-decoration: none; font-weight: bold; border: 2px solid #059669; padding: 12px 20px; border-radius: 50px; transition: 0.3s; width: 85%; font-size: 14px; }
        .whatsapp-btn:hover { background: #059669; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">4M</div>
    <p style="color: #64748b; font-weight: bold; margin-bottom: 5px;">Smart Learning System</p>
    
    <h1>كم عدد الأشكال في المربع؟ 🤔</h1>
    
    <div id="game-area" class="game-area"></div>
    <input type="number" id="user-answer" placeholder="؟" min="1">
    <button onclick="checkAnswer()">تحقق من الإجابة</button>
    <div id="result-msg" class="result"></div>

    <div id="honor-roll">
        <h2>🏆 لوحة شرف أبطال 4M</h2>
        <input type="text" id="hero-name" placeholder="اكتب اسم البطل هنا">
        <button class="save-btn" onclick="addToHonorRoll()">تسجيل البطل في الموقع</button>
        <ul id="names-list"></ul>
    </div>

    <hr style="margin-top: 30px; border: 0; border-top: 1px solid #eee;">
    
    <a href="https://wa.me/201222325708?text=أنا-مهتمة-بطلب-نسخة-جديدة-من-بوكليت-4M" class="whatsapp-btn">طلب النسخة القادمة من 4M 📚</a>
</div>

<script>
    let currentNumber = 0;
    const icons = ['🍎', '🍏', '🍊', '🍓', '🎈', '⭐', '🦁', '🚗'];

    // بدء اللعبة
    function startGame() {
        currentNumber = Math.floor(Math.random() * 5) + 1;
        let randomIcon = icons[Math.floor(Math.random() * icons.length)];
        document.getElementById('game-area').innerText = randomIcon.repeat(currentNumber);
        document.getElementById('result-msg').innerText = '';
        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').focus();
    }

    // التحقق من الإجابة
    function checkAnswer() {
        let userAnswer = document.getElementById('user-answer').value;
        let msg = document.getElementById('result-msg');
        
        if(userAnswer == currentNumber) {
            msg.innerHTML = "بطل! إجابة صحيحة 🌟👏";
            msg.style.color = "#10b981";
            setTimeout(startGame, 2000);
        } else if (userAnswer == "") {
            msg.innerHTML = "اكتب رقم يا بطل! 😊";
            msg.style.color = "#f59e0b";
        } else {
            msg.innerHTML = "حاول مرة تانية.. أنت تقدر! 💪";
            msg.style.color = "#ef4444";
        }
    }

    // إدارة لوحة الشرف
    function displayNames() {
        const list = document.getElementById('names-list');
        const names = JSON.parse(localStorage.getItem('4m_heroes') || '[]');
        // عرض آخر 5 أسماء مسجلة لتجنب زحمة الصفحة
        list.innerHTML = names.reverse().slice(0, 5).map(name => `<li>⭐ البطل: ${name}</li>`).join('');
    }

    function addToHonorRoll() {
        const nameInput = document.getElementById('hero-name');
        if(nameInput.value.trim() !== "") {
            let names = JSON.parse(localStorage.getItem('4m_heroes') || '[]');
            names.push(nameInput.value);
            localStorage.setItem('4m_heroes', JSON.stringify(names));
            nameInput.value = "";
            displayNames();
            alert("تم تسجيل اسمك يا بطل في لوحة الشرف! 🎖️");
        }
    }

    // دعم زر Enter في الكيبورد
    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
    document.getElementById('hero-name').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addToHonorRoll();
    });

    // تشغيل اللعبة والأسماء عند التحميل
    startGame();
    displayNames();
</script>

</body>
</html>
